# =============================================================
# Aplicação
# =============================================================
spring.application.name=mylife-backend
server.port=8080

# =============================================================
# Banco de dados — H2 em arquivo (dados persistem entre reinicios)
# Arquivo criado em: mylife-backend/data/mylifedb.mv.db
# =============================================================
spring.datasource.url=jdbc:h2:file:./data/mylifedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2 acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================================
# JPA / Hibernate
# =============================================================
# Atualiza o schema sem apagar dados (persistência entre reinicios)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Roda data.sql após o Hibernate (para migrations manuais de nullability)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
# Dialeto detectado automaticamente pelo Hibernate; declaração explícita gera aviso
# spring.jpa.database-platform removido propositalmente
# Desabilita Open Session in View (evita queries acidentais na camada de view)
spring.jpa.open-in-view=false

# =============================================================
# HTTP — encoding UTF-8 explícito nas respostas JSON
# =============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# =============================================================
# JWT — segredo e tempo de expiração configuráveis
# =============================================================
mylife.security.jwt.secret=mude-este-valor-em-producao-use-256-bits-no-minimo
mylife.security.jwt.expiration-ms=86400000

# =============================================================
# CORS — libera o frontend Angular em desenvolvimento
# =============================================================
mylife.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# =============================================================
# SpringDoc OpenAPI — Swagger UI
# =============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
