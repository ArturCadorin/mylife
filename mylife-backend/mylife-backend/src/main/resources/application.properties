# =============================================================
# Aplicação
# =============================================================
spring.application.name=mylife-backend
server.port=8080

# =============================================================
# Banco de dados — perfil ativo (dev usa PostgreSQL local)
# =============================================================
spring.profiles.active=dev

# =============================================================
# JPA / Hibernate
# =============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================================
# HTTP — encoding UTF-8 explícito nas respostas JSON
# =============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# =============================================================
# JWT — segredo e tempo de expiração configuráveis
# =============================================================
mylife.security.jwt.secret=mude-este-valor-em-producao-use-256-bits-no-minimo
mylife.security.jwt.expiration-ms=86400000

# =============================================================
# CORS — libera o frontend em desenvolvimento
# =============================================================
mylife.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# =============================================================
# SpringDoc OpenAPI — Swagger UI
# =============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
